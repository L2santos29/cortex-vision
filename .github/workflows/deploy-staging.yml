name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: |
          API_KEY=test-key-for-testing python -m pytest tests/ -v --cov=src --cov-report=term --cov-fail-under=80
        env:
          API_KEY: test-key-for-testing

  build-and-deploy:
    name: Build and Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t cortex-vision:staging -f Dockerfile .

      - name: Save image artifact
        run: |
          docker save cortex-vision:staging | gzip > cortex-vision-staging.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: cortex-vision-staging
          path: cortex-vision-staging.tar.gz
          retention-days: 7

      # Opcional: desplegar en un servidor remoto vía SSH
