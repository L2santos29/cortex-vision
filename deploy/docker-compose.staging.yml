# =============================================================================
# Cortex-Vision — Staging Environment
# =============================================================================
# Usage: docker compose -f docker-compose.staging.yml up -d
#
# Differences from dev:
#   - Automatic TLS with Caddy (Let's Encrypt)
#   - Resource limits (memory, CPU)
#   - Restart policies
#   - Configured logging (max size, rotation)
#   - Isolated network
#   - No development mounts (static code copy)
# =============================================================================

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      cortex-vision:
        condition: service_healthy
    networks:
      - cortex-net

  cortex-vision:
    build:
      context: .
      dockerfile: Dockerfile
    image: cortex-vision:staging
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # Required — crash if not defined
      - API_KEY=${API_KEY:?API_KEY is required}
      # Optional with safe defaults for staging
      - CORS_ORIGINS=${CORS_ORIGINS:-https://staging.example.com}
      - RATE_LIMIT=${RATE_LIMIT:-60}
      - RATE_WINDOW=${RATE_WINDOW:-60}
      - YOLO_MODEL=${YOLO_MODEL:-yolov8n.pt}
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/output
    volumes:
      - uploads:/app/uploads
      - output:/app/output
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
          cpus: "0.5"
    # Health check for orchestration
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cortex-net

networks:
  cortex-net:
    driver: bridge

volumes:
  uploads:
    driver: local
  output:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
