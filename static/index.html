<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex-Vision</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d2991d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header h1 { font-size: 1.5rem; color: var(--accent); }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .card h2 { margin-bottom: 1rem; font-size: 1.1rem; }
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-area:hover { border-color: var(--accent); }
        .upload-area.dragover { border-color: var(--green); background: rgba(63,185,80,0.05); }
        input[type="file"] { display: none; }
        #results { margin-top: 1rem; }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        .result-item:last-child { border-bottom: none; }
        .tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            background: rgba(88,166,255,0.15);
            color: var(--accent);
        }
        .badge {
            display: inline-block;
            background: var(--green);
            color: #fff;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <header>
        <h1>🧠 Cortex-Vision</h1>
        <span class="badge">Pre-Alpha</span>
    </header>
    <main>
        <div class="card">
            <h2>📤 Upload Images</h2>
            <div class="upload-area" id="dropZone">
                <p>Drop images here or click to upload</p>
                <p style="color:#8b949e;font-size:0.85rem;margin-top:0.5rem;">
                    .jpg .jpeg .png .webp (up to 10MB each)
                </p>
            </div>
            <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.webp,.bmp">
            <button id="uploadBtn">Process Images</button>
            <div id="status"></div>
        </div>
        <div class="card" id="resultsCard" style="display:none;">
            <h2>📊 Results</h2>
            <div id="results"></div>
        </div>
    </main>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusEl = document.getElementById('status');
        const resultsCard = document.getElementById('resultsCard');
        const resultsEl = document.getElementById('results');

        let selectedFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', () => handleFiles(fileInput.files));

        function handleFiles(files) {
            selectedFiles = Array.from(files);
            dropZone.innerHTML = `<p>${selectedFiles.length} file(s) selected</p>`;
            fileInput.files = files;
        }

        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            statusEl.innerHTML = '<p style="color:var(--accent)">Processing...</p>';
            const formData = new FormData();
            selectedFiles.forEach(f => formData.append('files', f));

            try {
                const resp = await fetch('/upload/batch', { method: 'POST', body: formData });
                const data = await resp.json();
                statusEl.innerHTML = `<p style="color:var(--green)">✅ ${data.files_processed} images processed — ${data.total_objects} objects detected</p>`;
                loadResults(data.task_id);
            } catch (err) {
                statusEl.innerHTML = `<p style="color:#f85149">❌ Error: ${err.message}</p>`;
            }
        });

        async function loadResults(taskId) {
            try {
                const resp = await fetch(`/results/${taskId}`);
                const data = await resp.json();
                resultsCard.style.display = 'block';
                resultsEl.innerHTML = data.detections.slice(0, 20).map(d =>
                    `<div class="result-item">
                        <span>${d.class}</span>
                        <span class="tag">${d.confidence}</span>
                    </div>`
                ).join('');
            } catch (err) {
                resultsEl.innerHTML = `<p style="color:#f85149">Failed to load results</p>`;
            }
        }
    </script>
</body>
</html>
